# Dependabot version updates.
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # npm dependencies (build tooling + the react/react-dom runtime).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    groups:
      # Batch low-risk updates into one PR to cut noise; major bumps stay separate.
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      # Packages with cross peer-dependencies must be bumped together, or the
      # single-package PR fails `npm ci` (react-dom pins react, @eslint/js pins eslint, ...).
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
        update-types: ["major"]
      eslint:
        patterns: ["eslint", "@eslint/*", "eslint-plugin-*", "typescript-eslint"]
        update-types: ["major"]

  # Actions pinned in the CI and release workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["dependencies", "github-actions"]
