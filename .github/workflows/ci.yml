name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Lint
        run: npm run eslint

      - name: Test
        run: npm run test

      - name: Build (Chrome/Edge + Firefox)
        run: npm run build:all

      - name: Lint the Firefox build (web-ext)
        run: npx --yes web-ext lint --source-dir dist/firefox --self-hosted
        continue-on-error: true
