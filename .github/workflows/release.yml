name: Release

# Triggered by the tags that scripts/release.mjs creates (e.g. v0.5.0).
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Lint
        run: npm run eslint

      - name: Test
        run: npm run test

      - name: Verify tag matches manifest version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MANIFEST="$(node -p "require('./manifest.json').version")"
          echo "Tag version: $TAG · manifest version: $MANIFEST"
          if [ "$TAG" != "$MANIFEST" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match manifest.json version $MANIFEST"
            exit 1
          fi

      - name: Build all targets
        run: npm run build:all

      - name: Package store artifacts
        run: npm run package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true

